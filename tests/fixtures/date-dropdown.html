<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResumeBridge 拆分日期下拉测试页</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f4f6f8;
        color: #18202a;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 32px));
        margin: 36px auto;
        padding: 24px;
        border: 1px solid #d6dde4;
        border-radius: 8px;
        background: #ffffff;
      }
      h1 { margin: 0 0 24px; font-size: 22px; }
      .form-item { display: grid; gap: 9px; }
      .field-label { font-size: 14px; font-weight: 700; }
      .date-range {
        display: grid;
        grid-template-columns: minmax(100px, 1fr) minmax(90px, 1fr) 18px minmax(100px, 1fr) minmax(90px, 1fr);
        align-items: center;
        gap: 8px;
      }
      .date-select {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 42px;
        padding: 0 12px;
        border: 1px solid #b9c4cf;
        border-radius: 6px;
        background: #ffffff;
        color: #52606d;
        cursor: pointer;
      }
      .date-select::after { content: "▾"; color: #8290a0; }
      .range-separator { text-align: center; }
      .dropdown {
        position: fixed;
        z-index: 1000;
        width: 130px;
        max-height: 180px;
        overflow-y: auto;
        border: 1px solid #d6dde4;
        border-radius: 6px;
        background: #ffffff;
        box-shadow: 0 10px 28px rgba(24, 32, 42, 0.18);
      }
      .dropdown [role="option"] {
        display: block;
        width: 100%;
        min-height: 36px;
        padding: 0 12px;
        border: 0;
        background: #ffffff;
        color: #253141;
        text-align: left;
        cursor: pointer;
      }
      .dropdown [role="option"]:hover { background: #eef5f3; }
      @media (max-width: 560px) {
        .date-range { grid-template-columns: 1fr 1fr; }
        .range-separator { display: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>教育背景</h1>
      <div class="form-item">
        <span class="field-label">就读时间</span>
        <div class="date-range">
          <button id="startYear" class="date-select" type="button" role="combobox" aria-label="开始年" aria-expanded="false" data-kind="year">年</button>
          <button id="startMonth" class="date-select" type="button" role="combobox" aria-label="开始月" aria-expanded="false" data-kind="month">月</button>
          <span class="range-separator">-</span>
          <button id="endYear" class="date-select" type="button" role="combobox" aria-label="结束年" aria-expanded="false" data-kind="year">年</button>
          <button id="endMonth" class="date-select" type="button" role="combobox" aria-label="结束月" aria-expanded="false" data-kind="month">月</button>
        </div>
      </div>
    </main>

    <script>
      let activeDropdown = null;

      function closeDropdown() {
        activeDropdown?.remove();
        activeDropdown = null;
        document.querySelectorAll('[role="combobox"][aria-expanded="true"]').forEach((item) => {
          item.setAttribute("aria-expanded", "false");
          item.removeAttribute("aria-controls");
        });
      }

      function openDropdown(trigger) {
        closeDropdown();
        const values = trigger.dataset.kind === "year"
          ? Array.from({ length: 21 }, (_, index) => String(2030 - index))
          : Array.from({ length: 12 }, (_, index) => String(index + 1));
        const root = document.createElement("div");
        root.id = `dropdown-${trigger.id}`;
        root.className = "dropdown";
        root.setAttribute("role", "listbox");
        const rect = trigger.getBoundingClientRect();
        root.style.left = `${rect.left}px`;
        root.style.top = `${Math.min(window.innerHeight - 190, rect.bottom + 4)}px`;

        for (const value of values) {
          const option = document.createElement("button");
          option.type = "button";
          option.setAttribute("role", "option");
          option.setAttribute("data-value", value);
          option.textContent = trigger.dataset.kind === "month" ? `${value}月` : value;
          option.addEventListener("click", () => {
            trigger.dataset.value = value;
            trigger.firstChild.textContent = value;
            trigger.dispatchEvent(new Event("change", { bubbles: true }));
            closeDropdown();
          });
          root.appendChild(option);
        }

        document.body.appendChild(root);
        activeDropdown = root;
        trigger.setAttribute("aria-expanded", "true");
        trigger.setAttribute("aria-controls", root.id);
      }

      document.querySelectorAll('[role="combobox"]').forEach((trigger) => {
        trigger.addEventListener("click", () => openDropdown(trigger));
        trigger.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeDropdown();
          }
        });
      });
    </script>
  </body>
</html>
